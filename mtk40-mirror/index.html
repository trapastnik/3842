<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>МТК 40 · Зеркало</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage">
      <header class="title">
        <span class="title__num">МТК · 40 · ВАРИАНТ 02</span>
        <h1 class="title__h">Зеркало</h1>
        <p class="title__sub">им · о нём · читал · нити связей при касании</p>
      </header>

      <canvas id="mirror"></canvas>

      <aside id="card" class="card" hidden>
        <button class="card__close" type="button" aria-label="Закрыть">✕</button>
        <div class="card__cat" data-bind="cat"></div>
        <h2 class="card__name" data-bind="name"></h2>
        <p class="card__author" data-bind="author"></p>
        <p class="card__where" data-bind="where"></p>
        <p class="card__text" data-bind="short"></p>
        <ul id="card-conns" class="card__conns" hidden></ul>
      </aside>

      <a class="back" href="../">← все МТК</a>
    </main>

    <script type="module" src="./mirror.js?v=1"></script>
  </body>
</html>
