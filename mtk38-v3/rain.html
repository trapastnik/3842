<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>МТК 38 v3 · Дождь имён (GPU)</title>
<link rel="stylesheet" href="./fonts/faces.css">
<script type="importmap">{ "imports": {
  "three": "./vendor/three/build/three.webgpu.js",
  "three/webgpu": "./vendor/three/build/three.webgpu.js",
  "three/tsl": "./vendor/three/build/three.tsl.js",
  "three/addons/": "./vendor/three/jsm/"
}}</script>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#10141a;font-family:"20 Kopeek",ui-monospace,Menlo,monospace;color:#F7F9EF}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
  #vign{position:fixed;inset:0;z-index:6;pointer-events:none;background:radial-gradient(ellipse 70% 70% at 50% 50%,transparent 45%,rgba(5,7,10,.7) 100%)}
  #hint{position:fixed;left:16px;bottom:12px;z-index:7;font-size:12px;color:#9DA3A8;opacity:.6;pointer-events:none}#hint b{color:#D2B773}
  #err{position:fixed;left:16px;top:60px;z-index:9;max-width:60vw;color:#ff9a9a;font-size:13px;white-space:pre-wrap;display:none}
</style>
</head><body>
<canvas id="c"></canvas>
<div id="vign"></div>
<div id="hint">МТК 38 v3 · дождь имён (GPU-частицы) · слова всплывают · <b>веди/жми</b> — отталкивай · <b>P</b> — нагрузка</div>
<div id="err"></div>
<script type="module">
import * as THREE from 'three';
import { createRenderer, fit } from './engine/renderer.js';
import { createStats } from './engine/stats.js';
import { makeWordAtlas } from './engine/atlas.js';
import { createRain } from './scenes/rain.js';
import { WORDS } from './words.js';

const showErr = (m) => { const e = document.getElementById('err'); e.style.display = 'block'; e.textContent = 'ОШИБКА: ' + m; };
window.__rain = { ready: false };
try {
  const canvas = document.getElementById('c');
  if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch (_) {} }

  const { renderer, backend, webgpuAvailable } = await createRenderer({ canvas, tonemap: 'neutral', exposure: 1.0, clear: 0x10141a });

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x10141a);
  scene.fog = new THREE.FogExp2(0x10141a, 0.005);
  const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 200);
  camera.position.set(0, 0, 26); camera.lookAt(0, 0, 0);

  const atlas = makeWordAtlas(THREE, WORDS, { cell: 256, cols: 8, glow: 0 });
  const rain = await createRain(THREE, renderer, { atlas, count: 500 });
  scene.add(rain.mesh);

  // палец → мир (плоскость z=0) → отталкивание
  const ndc = new THREE.Vector2(), ray = new THREE.Raycaster();
  const toWorld = (cx, cy) => { ndc.set(cx / globalThis.innerWidth * 2 - 1, -(cy / globalThis.innerHeight * 2 - 1)); ray.setFromCamera(ndc, camera);
    const t = -ray.ray.origin.z / ray.ray.direction.z; return ray.ray.origin.clone().addScaledVector(ray.ray.direction, t); };
  let pr = 0;
  canvas.addEventListener('pointermove', (e) => { rain.setPointer(toWorld(e.clientX, e.clientY), pr || 5.5); pr = pr || 5.5; }, { passive: true });
  canvas.addEventListener('pointerdown', (e) => { pr = 8.5; rain.setPointer(toWorld(e.clientX, e.clientY), pr); });
  canvas.addEventListener('pointerup', () => { pr = 5.5; });
  canvas.addEventListener('pointerleave', () => { pr = 0; rain.setPointer(new THREE.Vector3(0, 0, 0), 0); });

  const stats = createStats(renderer, { extra: () => `частиц    ${rain.count}` });
  const onResize = () => fit(renderer, camera); addEventListener('resize', onResize); onResize();

  let prev = performance.now(), n = 0;
  renderer.setAnimationLoop(async () => {
    const now = performance.now(), dt = Math.min(0.05, (now - prev) / 1000); prev = now;
    await rain.update(dt);
    await renderer.renderAsync(scene, camera);
    stats.update(backend + (webgpuAvailable ? '' : ' (фоллбэк)'));
    if (++n === 3) { window.__rain = { ready: true, backend }; document.title = 'rain READY:' + backend; }
  });
} catch (e) { showErr((e && e.stack) || e); document.title = 'rain ERROR'; console.error(e); }
</script>
</body></html>
