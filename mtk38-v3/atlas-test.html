<!doctype html>
<html lang="ru"><head>
<meta charset="utf-8">
<link rel="stylesheet" href="./fonts/faces.css">
<script type="importmap">{ "imports": { "three": "./vendor/three/build/three.webgpu.js" } }</script>
<style>body{margin:0;background:#12161a}canvas{width:100vw;display:block}</style>
</head><body>
<script type="module">
import * as THREE from 'three';
import { makeWordAtlas } from './engine/atlas.js';
import { loadWords } from './engine/data.js';
await (document.fonts ? document.fonts.ready : Promise.resolve());
const WORDS = await loadWords();
const a = makeWordAtlas(THREE, WORDS, {});
const src = a.texture.image;                       // канвас атласа
const c = document.createElement('canvas');
c.width = Math.round(src.width / 2.5); c.height = Math.round(src.height / 2.5);
c.getContext('2d').drawImage(src, 0, 0, c.width, c.height);
document.body.appendChild(c);
document.title = 'atlas READY ' + a.rects.length;
</script>
</body></html>
