server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Служебные файлы репозитория не отдаём наружу:
    #   .md   — README, PLAN, COORDINATION, CLAUDE и т.п.
    #   .conf / .yml — infra (этот файл, docker-compose.yml)
    #   .docx — исходные ТЗ музея
    #   .py   — tooling в assets/mtk*/tools/
    location ~* \.(conf|ya?ml|md|docx?|py)$ { deny all; }

    # Все dot-файлы: .git/, .gitignore, .DS_Store и т.п.
    location ~ /\. { deny all; }

    location / {
        try_files $uri $uri/ =404;
    }
}
