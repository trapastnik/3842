<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>МТК 41 · Хронология</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="stage" aria-label="МТК 41 Скульптуры Ленина — хронология">
    <canvas id="timeline" aria-hidden="true"></canvas>
    <header class="title-block" aria-hidden="true">
      <div class="kicker">МТК 41 · Скульптуры</div>
      <h1>Хронология Ленинианы</h1>
      <div class="subtitle">1919 — первый бюст. 1925 — пять памятников за год. 1973 — 57-метровый колосс на Волго-Доне.</div>
    </header>
    <aside class="card" id="card" hidden>
      <button class="card-close" id="card-close" aria-label="Закрыть">×</button>
      <div class="card-photo" id="card-photo"></div>
      <div class="card-body">
        <div class="card-year" id="card-year"></div>
        <h2 class="card-title" id="card-title"></h2>
        <div class="card-place" id="card-place"></div>
        <div class="card-author" id="card-author"></div>
        <p class="card-text" id="card-text"></p>
        <section class="card-models" id="card-models" hidden>
          <div class="card-models-heading">3D-модель</div>
          <div class="card-mode-switch" id="card-mode-switch">
            <button type="button" class="card-mode-tab active" data-mode="native">Свой плеер</button>
            <button type="button" class="card-mode-tab" data-mode="iframe">Sketchfab · онлайн</button>
          </div>
          <div class="card-model-native" id="card-model-native"></div>
          <div class="card-model-viewer" id="card-model-viewer" hidden></div>
          <div class="card-model-controls" id="card-model-controls" hidden></div>
        </section>
        <div class="card-status" id="card-status"></div>
      </div>
    </aside>
  </main>
  <script type="importmap">
  {
    "imports": {
      "three": "../assets/mtk41/lib/three/three.module.min.js",
      "three/addons/": "../assets/mtk41/lib/three/addons/"
    }
  }
  </script>
  <script type="module">
    import { MonumentViewer, inferMonumentType } from "../assets/mtk41/lib/monument-viewer.js";

    let heightsData = {};
    let current = null;
    let lastMonument = null;
    let mode = "native";

    fetch("../assets/mtk41/heights.json").then(r => r.json()).then(d => { heightsData = d || {}; });

    function openNative(monument) {
      const c = document.getElementById("card-model-native");
      if (!c) return;
      if (current) { current.dispose(); current = null; }
      current = new MonumentViewer(c, {
        heights: heightsData[monument.id] || { statue: 5, pedestal: 2 },
        status: monument.status,
        type: inferMonumentType(monument.id),
      });
    }

    function applyMode() {
      const tabs = document.querySelectorAll(".card-mode-tab");
      tabs.forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
      const nativeC = document.getElementById("card-model-native");
      const iframeC = document.getElementById("card-model-viewer");
      if (mode === "native") {
        if (nativeC) nativeC.hidden = false;
        if (iframeC) iframeC.hidden = true;
        if (lastMonument) openNative(lastMonument);
      } else {
        if (current) { current.dispose(); current = null; }
        if (nativeC) nativeC.hidden = true;
        if (iframeC) iframeC.hidden = false;
      }
    }

    window.MtkMonumentViewer = {
      open(monument) {
        if (!monument) return;
        lastMonument = monument;
        if (mode === "native") openNative(monument);
      },
      close() {
        if (current) { current.dispose(); current = null; }
        lastMonument = null;
      },
    };

    document.addEventListener("click", e => {
      const t = e.target.closest(".card-mode-tab");
      if (!t) return;
      const m = t.dataset.mode;
      if (m && m !== mode) { mode = m; applyMode(); }
    });
  </script>
  <script src="./timeline.js"></script>
</body>
</html>
