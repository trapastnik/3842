services:
  web:
    image: nginx:alpine
    container_name: bmk-3842-web
    restart: unless-stopped
    ports:
      - "8094:80"
    volumes:
      # Контент репозитория отдаётся через nginx (read-only)
      - .:/usr/share/nginx/html:ro
      # Свой server-блок с правилами доступа (см. nginx.conf)
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
