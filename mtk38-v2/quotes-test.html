<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">

<title>МТК 38 v2 · визуализация цитат</title>
<style>
@font-face{font-family:"noto-Arab";src:url("./fonts/noto/Arab.woff2") format("woff2");font-display:swap}

@font-face{font-family:"noto-Jpan";src:url("./fonts/noto/Jpan.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Khmr";src:url("./fonts/noto/Khmr.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Knda";src:url("./fonts/noto/Knda.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Kore";src:url("./fonts/noto/Kore.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Laoo";src:url("./fonts/noto/Laoo.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Mlym";src:url("./fonts/noto/Mlym.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Mtei";src:url("./fonts/noto/Mtei.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Mymr";src:url("./fonts/noto/Mymr.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Nkoo";src:url("./fonts/noto/Nkoo.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Olck";src:url("./fonts/noto/Olck.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Orya";src:url("./fonts/noto/Orya.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Sinh";src:url("./fonts/noto/Sinh.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Taml";src:url("./fonts/noto/Taml.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Telu";src:url("./fonts/noto/Telu.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Tfng";src:url("./fonts/noto/Tfng.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Thaa";src:url("./fonts/noto/Thaa.woff2") format("woff2");font-display:swap}
@font-face{font-family:"noto-Tibt";src:url("./fonts/noto/Tibt.woff2") format("woff2");font-display:swap}
  @font-face{font-family:"21 Cent";src:url("../mtk38-globe/fonts/cent/21Cent.woff") format("woff");font-display:swap}
  @font-face{font-family:"Nolde";src:url("../mtk38-globe/fonts/nolde/nolde.otf") format("opentype");font-display:swap}
  @font-face{font-family:"20 Kopeek";src:url("../mtk38-globe/fonts/kopeek/20-kopeek-book.otf") format("opentype");font-display:swap}
  :root{--brass:#D2B773;--paper:#F7F9EF;--telegrey:#CFD0CF;--window:#9DA3A8}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#333d44}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .vign{position:fixed;inset:0;pointer-events:none;z-index:3;
    background:radial-gradient(ellipse at 50% 46%, rgba(0,0,0,0) 40%, rgba(18,22,25,.62) 100%)}
  .grain{position:fixed;inset:0;pointer-events:none;z-index:4;opacity:.05;mix-blend-mode:overlay}
  #back{position:fixed;z-index:1;left:50%;top:48%;transform:translate(-50%,-50%);
    font-weight:700;color:#fff;opacity:.05;white-space:nowrap;
    transition:opacity 1.6s ease, letter-spacing 12s linear;letter-spacing:.02em}
  .wrap{position:relative;z-index:2;max-width:1180px;padding:0 6vw;text-align:center;
    transition:opacity 1.1s ease, transform 1.1s ease}
  .ru{font-family:"21 Cent",Georgia,serif;color:var(--paper);line-height:1.22;
    text-shadow:0 0 26px rgba(247,249,239,.28),0 0 60px rgba(210,183,115,.12);margin:0}
  .attr{margin-top:30px;font-family:"20 Kopeek",system-ui,sans-serif;font-size:clamp(14px,1.5vw,19px);
    color:var(--brass);letter-spacing:.04em}
  .attr .nm{color:var(--paper)}
  .en{margin-top:14px;font-family:"21 Cent",Georgia,serif;font-size:clamp(13px,1.3vw,17px);
    color:var(--window);font-style:italic;opacity:.85}
  .dots{position:fixed;z-index:5;left:0;right:0;bottom:26px;display:flex;gap:7px;justify-content:center}
  .dots i{width:6px;height:6px;border-radius:50%;background:#5d6b74;transition:.4s}
  .dots i.on{background:var(--brass);width:18px;border-radius:3px}
  .hint{position:fixed;left:16px;bottom:12px;z-index:5;font:12px system-ui,sans-serif;color:var(--window);opacity:.5}
</style>
</head>
<body>
<div id="back"></div>
<div id="stage"><div class="wrap" id="wrap">
  <p class="ru" id="ru"></p>
  <div class="attr"><span class="nm">В. И. Ленин</span> · <span id="src"></span></div>
  <div class="en" id="en"></div>
</div></div>
<div class="vign"></div>
<canvas class="grain" id="grain"></canvas>
<div class="dots" id="dots"></div>
<div class="hint">МТК 38 v2 · визуализация цитат — идея сцены (можно как слой поверх глобуса)</div>
<script>
const DATA = {"q": [{"ru": "Коммунизм есть Советская власть плюс электрификация всей страны.", "en": "Communism is Soviet power plus the electrification of the whole country.", "work": "Наши внешнее и внутреннее положение и задачи партии", "year": ""}, {"ru": "Без революционной теории не может быть и революционного движения.", "en": "Without revolutionary theory there can be no revolutionary movement.", "work": "Что делать?", "year": "1902"}, {"ru": "Учиться, учиться и учиться.", "en": "Learn, learn, and learn.", "work": "Лучше меньше, да лучше", "year": "1923"}, {"ru": "Задачи молодёжи… можно было бы выразить одним словом: учиться.", "en": "The tasks of the youth… might be summed up in a single word: learn.", "work": "Задачи союзов молодёжи", "year": ""}, {"ru": "Лучше меньше, да лучше.", "en": "Better fewer, but better.", "work": "Лучше меньше, да лучше", "year": "1923"}, {"ru": "Религия есть опиум народа.", "en": "Religion is opium for the people.", "work": "Социализм и религия", "year": "1905"}, {"ru": "Кто не работает, тот не ест.", "en": "He who does not work, neither shall he eat.", "work": "Государство и революция", "year": "1917"}, {"ru": "Истина всегда конкретна.", "en": "Truth is always concrete.", "work": "Шаг вперёд, два шага назад", "year": "1904"}, {"ru": "Жить в обществе и быть свободным от общества нельзя.", "en": "One cannot live in society and be free from society.", "work": "Партийная организация и партийная литература", "year": "1905"}, {"ru": "Учение Маркса всесильно, потому что оно верно.", "en": "The Marxist doctrine is omnipotent because it is true.", "work": "Три источника и три составных части марксизма", "year": "1913"}, {"ru": "Дайте нам организацию революционеров — и мы перевернём Россию!", "en": "Give us an organisation of revolutionaries, and we will overturn Russia!", "work": "Что делать?", "year": "1902"}, {"ru": "Государство есть машина для угнетения одного класса другим.", "en": "The state is a machine for the oppression of one class by another.", "work": "Государство и революция", "year": "1917"}, {"ru": "Мы не утописты. Мы знаем, что любой чернорабочий и любая кухарка не способны сейчас же вступить в управление государством.", "en": "We are not utopians. We know that an unskilled labourer or a cook cannot immediately get on with the job of state administration.", "work": "Удержат ли большевики государственную власть?", "year": "1917"}], "bg": [{"w": "Ленин", "sc": "Cyrl"}, {"w": "Lenin", "sc": "Latn"}, {"w": "列宁", "sc": "Hans"}, {"w": "लेनिन", "sc": "Deva"}, {"w": "LENINI", "sc": "Latn"}, {"w": "ሌኒን", "sc": "Ethi"}, {"w": "لينين", "sc": "Arab"}, {"w": "Լենին", "sc": "Armn"}, {"w": "লেনিন", "sc": "Beng"}, {"w": "Ленін", "sc": "Cyrl"}, {"w": "لينن", "sc": "Arab"}, {"w": "লেনিন", "sc": "Beng"}, {"w": "လီနင်", "sc": "Mymr"}, {"w": "LENJIN", "sc": "Latn"}, {"w": "ʻO LENIN", "sc": "Latn"}, {"w": "Λένιν", "sc": "Grek"}, {"w": "ლენინი", "sc": "Geor"}, {"w": "LÉNIN", "sc": "Latn"}, {"w": "લેનિન", "sc": "Gujr"}, {"w": "لنین", "sc": "Arab"}, {"w": "LËNIN", "sc": "Latn"}, {"w": "לנין", "sc": "Hebr"}, {"w": "לענין", "sc": "Hebr"}, {"w": "ಲೆನಿನ್", "sc": "Knda"}, {"w": "列寧", "sc": "Hant"}, {"w": "ലെനിൻ", "sc": "Mlym"}, {"w": "Ļeņins", "sc": "Latn"}, {"w": "LENINAS", "sc": "Latn"}, {"w": "ເລນິນ", "sc": "Laoo"}, {"w": "លេនីន", "sc": "Khmr"}, {"w": "레닌", "sc": "Kore"}, {"w": "ꯂꯦꯅꯤꯟ", "sc": "Mtei"}, {"w": "LƐNIN", "sc": "Latn"}, {"w": "ଲେନିନ୍", "sc": "Orya"}, {"w": "LEENINII", "sc": "Latn"}, {"w": "ਲੈਨਿਨ", "sc": "Guru"}, {"w": "LÊNIN", "sc": "Latn"}, {"w": "ᱞᱮᱱᱤᱱ", "sc": "Olck"}, {"w": "لینین", "sc": "Arab"}, {"w": "لىنىن", "sc": "Arab"}, {"w": "LĒNINI", "sc": "Latn"}, {"w": "లెనిన్", "sc": "Telu"}, {"w": "லெனின்", "sc": "Taml"}, {"w": "ලෙනින්", "sc": "Sinh"}, {"w": "Лењин", "sc": "Cyrl"}, {"w": "LÉNINE", "sc": "Latn"}, {"w": "လီၢ်ခ့ၣ်ႇ", "sc": "Mymr"}, {"w": "レーニン", "sc": "Jpan"}, {"w": "ལེ་ནིན", "sc": "Tibt"}, {"w": "ލެނިން", "sc": "Thaa"}, {"w": "ߟߋߣߌ߲", "sc": "Nkoo"}, {"w": "ⵍⵉⵏⵉⵏ", "sc": "Tfng"}]};
const Q = DATA.q, BG = DATA.bg;
const FF = iso => (iso==='Latn'||iso==='Cyrl') ? "'20 Kopeek','Arial Unicode MS',sans-serif"
                : "'Arial Unicode MS','noto-"+iso+"',sans-serif";
const ru=document.getElementById('ru'), src=document.getElementById('src'), en=document.getElementById('en');
const wrap=document.getElementById('wrap'), back=document.getElementById('back');
const dots=document.getElementById('dots');
Q.forEach((_,i)=>{const d=document.createElement('i');dots.appendChild(d);});
const dn=[...dots.children];
let i=-1;
function size(t){ const n=t.length; return n<28?'clamp(34px,5.2vw,76px)':n<60?'clamp(28px,3.8vw,54px)':'clamp(22px,2.9vw,40px)'; }
function show(n){
  const q=Q[n];
  ru.textContent=q.ru; ru.style.fontSize=size(q.ru);
  src.textContent=q.work+(q.year?(', '+q.year):'');
  en.textContent=q.en;
  const b=BG[Math.floor(Math.random()*BG.length)];
  back.style.fontFamily=FF(b.sc); back.textContent=b.w;
  back.style.fontSize=Math.min(innerWidth*0.62,innerHeight*0.7)+'px';
  dn.forEach((d,k)=>d.classList.toggle('on',k===n));
}
function fade(){
  wrap.style.opacity=0; wrap.style.transform='translateY(10px)';
  back.style.opacity=0;
  setTimeout(()=>{ i=(i+1)%Q.length; show(i);
    wrap.style.opacity=1; wrap.style.transform='translateY(0)'; back.style.opacity=.06;
  },1100);
}
// плёночное зерно
const gc=document.getElementById('grain'),gx=gc.getContext('2d');
function grain(){gc.width=160;gc.height=160;const im=gx.createImageData(160,160);
  for(let k=0;k<im.data.length;k+=4){const v=Math.random()*255|0;im.data[k]=im.data[k+1]=im.data[k+2]=v;im.data[k+3]=255;}
  gx.putImageData(im,0,0);}
grain();gc.style.width=gc.style.height='100%';

(document.fonts?document.fonts.ready:Promise.resolve()).then(()=>{
  i=0; show(0); wrap.style.opacity=1; back.style.opacity=.06;
  setInterval(fade, 8000);
});
</script>
</body>
</html>
