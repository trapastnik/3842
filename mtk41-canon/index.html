<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>МТК 41 · Иконостас</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="stage" aria-label="МТК 41 Скульптуры Ленина — иконостас">
    <header class="title-block">
      <div class="kicker">МТК 41 · Скульптуры</div>
      <h1>Иконостас<br><span class="accent">Ленинианы</span></h1>
      <div class="subtitle">Девятнадцать изображений одного человека. От подмосковной зимы 1919 — до бронзы 1973.</div>
    </header>

    <section class="canon" id="canon" aria-label="Все 19 памятников"></section>

    <aside class="card" id="card" hidden>
      <button class="card-close" id="card-close" aria-label="Закрыть">×</button>
      <div class="card-photo" id="card-photo"></div>
      <div class="card-body">
        <div class="card-year" id="card-year"></div>
        <h2 class="card-title" id="card-title"></h2>
        <div class="card-place" id="card-place"></div>
        <div class="card-author" id="card-author"></div>
        <p class="card-text" id="card-text"></p>
        <section class="card-models" id="card-models" hidden>
          <div class="card-models-heading">3D-модели на Sketchfab</div>
          <div class="card-model-viewer" id="card-model-viewer" hidden></div>
          <div class="card-model-controls" id="card-model-controls" hidden></div>
        </section>
        <div class="card-status" id="card-status"></div>
      </div>
    </aside>
  </main>
  <script src="./canon.js"></script>
</body>
</html>
